<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Slate" />
<meta name="theme-color" content="#000000" />
<title>VFX Slate</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23000'/><text x='90' y='115' font-family='monospace' font-size='80' font-weight='bold' fill='%23f5d76e' text-anchor='middle'>SL</text></svg>" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000; color: #fff;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  body {
    width: 100vw; height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: flex; flex-direction: column;
  }

  /* ---- Permission overlay ---- */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.95);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    z-index: 100;
    padding: 20px;
  }
  #overlay h1 {
    margin: 0 0 4px; font-size: 18px; font-weight: 500;
    color: #f5d76e; letter-spacing: 2px;
  }
  #overlay p {
    margin: 0 0 16px; font-size: 12px; color: #888;
    text-align: center; max-width: 400px; line-height: 1.5;
  }
  .perm-btn {
    background: #1a1a1a; color: #fff;
    border: 1px solid #333; border-radius: 8px;
    padding: 14px 28px; min-width: 240px;
    font-family: inherit; font-size: 14px; font-weight: 500;
    letter-spacing: 1px; cursor: pointer;
    touch-action: manipulation;
  }
  .perm-btn:active { background: #2a2a2a; transform: scale(0.98); }
  .perm-btn.granted { background: #0a3a1a; border-color: #2a8a4a; color: #2ade7a; }
  .perm-btn.granted::before { content: "✓ "; }
  #start-btn {
    background: #f5d76e; color: #000; border-color: #f5d76e;
    margin-top: 8px; font-weight: 700;
  }
  #start-btn:disabled { opacity: 0.3; }
  .orient-hint {
    font-size: 11px; color: #555; margin-top: 8px;
  }

  /* ---- Main app ---- */
  #app { display: none; flex: 1; flex-direction: column; width: 100%; height: 100%; }
  #app.visible { display: flex; }

  /* Top: slate bar */
  .slate-bar {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 10px;
    border-bottom: 1px solid #1a1a1a;
    flex: 0 0 auto;
  }
  .btn {
    background: #1a1a1a; color: #fff;
    border: 1px solid #333; border-radius: 6px;
    height: 44px; min-width: 48px; padding: 0 10px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    letter-spacing: 0.5px; cursor: pointer;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:active { background: #2a2a2a; transform: scale(0.96); }
  .field {
    background: #000; color: #fff;
    border: 1px solid #333; border-radius: 6px;
    height: 44px; padding: 0 8px;
    font-family: inherit; font-size: 22px; font-weight: 500;
    letter-spacing: 2px; text-align: center;
    outline: none; -webkit-appearance: none;
  }
  .field:focus { border-color: #f5d76e; }
  #slate-field { flex: 1; min-width: 0; }
  #take-field { width: 56px; color: #f5d76e; font-size: 22px; }
  .take-group { display: flex; align-items: center; gap: 2px; }
  .take-group .t-label {
    font-size: 11px; color: #666; padding: 0 2px;
  }
  .spacer { width: 6px; flex: 0 0 auto; }

  /* Middle: bubble level */
  .level-row {
    flex: 1 1 auto;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    padding: 0 20px;
    min-height: 60px;
  }
  .level-track {
    position: relative;
    width: 100%; max-width: 600px;
    height: 28px;
    background: #0a0a0a;
    border: 1px solid #222;
    border-radius: 14px;
  }
  .level-center-line {
    position: absolute; left: 50%; top: -6px;
    width: 1px; height: 40px;
    background: #2a8a4a;
    transform: translateX(-50%);
  }
  .level-center-box {
    position: absolute; left: calc(50% - 16px); top: 4px;
    width: 32px; height: 20px;
    border: 1px dashed #2a8a4a;
    border-radius: 10px;
    opacity: 0.5;
  }
  #bubble {
    position: absolute; left: 50%; top: 4px;
    width: 20px; height: 20px;
    background: #f5d76e;
    border-radius: 50%;
    transform: translateX(-50%);
    transition: left 0.08s ease-out, background 0.15s;
    box-shadow: 0 0 4px rgba(245,215,110,0.4);
  }
  .level-label, .tilt-readout {
    position: absolute; top: 4px;
    font-size: 10px; color: #555;
    letter-spacing: 1px;
  }
  .level-label { left: 2px; }
  .tilt-readout { right: 2px; }

  /* Bottom: exposure */
  .exposure-row {
    flex: 0 0 auto;
    padding: 6px 10px 8px;
    border-top: 1px solid #1a1a1a;
  }
  .exp-line {
    display: flex; align-items: center; gap: 8px;
  }
  .exp-label { font-size: 10px; color: #666; letter-spacing: 1px; }
  .exp-bar {
    flex: 1; height: 16px;
    background: linear-gradient(to right,
      #1a1a3a 0%, #1a1a1a 25%, #1a3a1a 45%,
      #2a6a2a 50%, #1a3a1a 55%, #1a1a1a 75%, #3a1a1a 100%);
    border: 1px solid #222;
    border-radius: 8px;
    position: relative;
  }
  .exp-center {
    position: absolute; left: 50%; top: -3px;
    width: 1px; height: 22px;
    background: #555;
    transform: translateX(-50%);
  }
  #exp-needle {
    position: absolute; left: 50%; top: -4px;
    width: 2px; height: 24px;
    background: #fff;
    transform: translateX(-50%);
    transition: left 0.15s ease-out;
    box-shadow: 0 0 3px rgba(255,255,255,0.7);
  }
  #exp-readout {
    font-size: 12px; color: #f5d76e;
    min-width: 64px; text-align: right;
    letter-spacing: 0.5px;
  }
  .exp-scale {
    display: flex; justify-content: space-between;
    font-size: 8px; color: #444;
    padding: 2px 30px 0;
  }

  /* Hidden video for camera capture */
  #cam-video { display: none; }

  /* Calibrate button (small, corner) */
  #calibrate {
    position: absolute; bottom: 4px; right: 8px;
    font-size: 9px; color: #444; background: none;
    border: none; padding: 4px 6px; cursor: pointer;
    letter-spacing: 0.5px;
  }
  #calibrate:active { color: #f5d76e; }
</style>
</head>
<body>

<!-- ============ PERMISSION OVERLAY ============ -->
<div id="overlay">
  <h1>VFX SLATE</h1>
  <p>This app needs motion and camera access to work as a level and light meter. Both stay on-device — nothing is recorded or sent anywhere.</p>

  <button class="perm-btn" id="motion-btn">Enable level (motion)</button>
  <button class="perm-btn" id="camera-btn">Enable meter (camera)</button>

  <button class="perm-btn" id="start-btn" disabled>Start →</button>

  <div class="orient-hint">Rotate phone to landscape after starting</div>
</div>

<!-- ============ MAIN APP ============ -->
<div id="app">

  <div class="slate-bar">
    <button class="btn" id="sl-minus" aria-label="Previous slate">SL−</button>
    <input class="field" id="slate-field" value="1-1" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" />
    <button class="btn" id="sl-plus" aria-label="Next slate">SL+</button>
    <div class="spacer"></div>
    <button class="btn" id="tk-minus" aria-label="Previous take">TK−</button>
    <div class="take-group">
      <span class="t-label">T</span>
      <input class="field" id="take-field" value="1" inputmode="numeric" autocomplete="off" />
    </div>
    <button class="btn" id="tk-plus" aria-label="Next take">TK+</button>
  </div>

  <div class="level-row">
    <span class="level-label">LEVEL</span>
    <div class="level-track">
      <div class="level-center-line"></div>
      <div class="level-center-box"></div>
      <div id="bubble"></div>
    </div>
    <span class="tilt-readout" id="tilt-readout">—</span>
  </div>

  <div class="exposure-row">
    <div class="exp-line">
      <span class="exp-label">EXP</span>
      <div class="exp-bar">
        <div class="exp-center"></div>
        <div id="exp-needle"></div>
      </div>
      <span id="exp-readout">—</span>
    </div>
    <div class="exp-scale">
      <span>−3</span><span>−2</span><span>−1</span><span>0</span><span>+1</span><span>+2</span><span>+3</span>
    </div>
    <button id="calibrate" title="Set current light as 0 EV reference">CAL</button>
  </div>

  <video id="cam-video" autoplay playsinline muted></video>
</div>

<script>
'use strict';

/* ============================================================
   SLATE LOGIC — pure functions, alphabet skips I and O
   ============================================================ */
const SLATE_LETTERS = ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','U','V','W','X','Y','Z'];
const BASE = SLATE_LETTERS.length; // 24

function parseSlate(str) {
  const m = String(str || '').trim().match(/^(\d+)-(\d+)([A-Z]*)$/i);
  if (!m) return null;
  return { ep: parseInt(m[1], 10), scene: parseInt(m[2], 10), variant: (m[3] || '').toUpperCase() };
}
function formatSlate(s) { return s.ep + '-' + s.scene + s.variant; }

function variantToIndex(v) {
  if (!v) return 0;
  let n = 0;
  for (let i = 0; i < v.length; i++) {
    const pos = SLATE_LETTERS.indexOf(v[i]);
    if (pos < 0) return 0; // I, O, or junk
    n = n * BASE + (pos + 1);
  }
  return n;
}
function indexToVariant(n) {
  if (n <= 0) return '';
  let out = '';
  while (n > 0) {
    const r = (n - 1) % BASE;
    out = SLATE_LETTERS[r] + out;
    n = Math.floor((n - 1) / BASE);
  }
  return out;
}

/* ============================================================
   PERSISTENT STATE
   ============================================================ */
const STORAGE_KEY = 'vfx-slate-state-v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      slate: slateField.value,
      take: takeField.value,
      expRef: expRefLuma
    }));
  } catch (e) {}
}

/* ============================================================
   DOM REFS
   ============================================================ */
const overlay = document.getElementById('overlay');
const motionBtn = document.getElementById('motion-btn');
const cameraBtn = document.getElementById('camera-btn');
const startBtn = document.getElementById('start-btn');
const app = document.getElementById('app');

const slateField = document.getElementById('slate-field');
const takeField = document.getElementById('take-field');
const bubble = document.getElementById('bubble');
const tiltReadout = document.getElementById('tilt-readout');
const expNeedle = document.getElementById('exp-needle');
const expReadout = document.getElementById('exp-readout');
const calibrateBtn = document.getElementById('calibrate');
const camVideo = document.getElementById('cam-video');

/* ============================================================
   PERMISSION FLOWS
   ============================================================ */
let motionGranted = false;
let cameraGranted = false;
let cameraStream = null;

function updateStartBtn() {
  // Allow start as long as at least one is granted; both is ideal
  startBtn.disabled = !(motionGranted || cameraGranted);
  startBtn.textContent = (motionGranted && cameraGranted) ? 'Start →' : 'Start anyway →';
}

motionBtn.addEventListener('click', async () => {
  try {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result === 'granted') {
        attachOrientation();
        motionGranted = true;
        motionBtn.classList.add('granted');
        motionBtn.textContent = 'Level enabled';
      } else {
        motionBtn.textContent = 'Motion denied — tap to retry';
      }
    } else {
      // Android / desktop — just attach
      attachOrientation();
      motionGranted = true;
      motionBtn.classList.add('granted');
      motionBtn.textContent = 'Level enabled';
    }
  } catch (err) {
    motionBtn.textContent = 'Error: ' + err.message;
  }
  updateStartBtn();
});

cameraBtn.addEventListener('click', async () => {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 320 },
        height: { ideal: 240 }
      },
      audio: false
    });
    camVideo.srcObject = cameraStream;
    await camVideo.play();
    cameraGranted = true;
    cameraBtn.classList.add('granted');
    cameraBtn.textContent = 'Meter enabled';
    startExposureLoop();
  } catch (err) {
    cameraBtn.textContent = 'Camera denied — tap to retry';
  }
  updateStartBtn();
});

startBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  app.classList.add('visible');
  requestWakeLock();
  // Restore persisted state if any
  const saved = loadState();
  if (saved) {
    if (saved.slate) slateField.value = saved.slate;
    if (saved.take) takeField.value = saved.take;
    if (typeof saved.expRef === 'number') expRefLuma = saved.expRef;
  }
});

/* ============================================================
   ORIENTATION → BUBBLE LEVEL
   ============================================================ */
let lastTilt = 0;

function attachOrientation() {
  window.addEventListener('deviceorientation', onOrientation, true);
}

function onOrientation(e) {
  // In locked-landscape, the relevant roll axis depends on which side is up.
  // screen.orientation.angle: 0 portrait, 90 landscape-left, -90/270 landscape-right
  const angle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;

  let tilt;
  // beta: front-back tilt (-180..180), gamma: left-right tilt (-90..90)
  if (angle === 90 || angle === -90 || angle === 270) {
    // Landscape — the "horizon roll" we want is beta
    tilt = e.beta || 0;
    // In landscape-right (angle -90 / 270), beta goes the wrong direction
    if (angle === -90 || angle === 270) tilt = -tilt;
    // Subtract 90 because beta=90 means phone is upright; in landscape level=0 means beta near 0... actually
    // After much experimentation: in landscape, beta directly reports the roll across the long axis.
    // We want 0 when phone is flat on its long edge. Keep raw.
  } else {
    // Portrait fallback — use gamma
    tilt = e.gamma || 0;
  }

  lastTilt = tilt;
  renderBubble(tilt);
}

function renderBubble(tilt) {
  // ±15° maps to ±45% from center (5%..95%)
  const clamped = Math.max(-15, Math.min(15, tilt));
  const pct = 50 + (clamped / 15) * 45;
  bubble.style.left = pct + '%';

  const abs = Math.abs(tilt);
  bubble.style.background = abs < 0.5 ? '#2ade7a' : abs < 2 ? '#f5d76e' : '#e85a3a';
  bubble.style.boxShadow = '0 0 6px ' + (abs < 0.5 ? 'rgba(42,222,122,0.5)' : abs < 2 ? 'rgba(245,215,110,0.4)' : 'rgba(232,90,58,0.4)');

  tiltReadout.textContent = (tilt >= 0 ? '+' : '') + tilt.toFixed(1) + '°';
}

/* ============================================================
   CAMERA LUMINANCE → EXPOSURE METER
   ============================================================ */
let expRefLuma = 128; // calibration reference, mid-gray default
let exposureRAF = null;
const sampleCanvas = document.createElement('canvas');
sampleCanvas.width = 80; sampleCanvas.height = 60;
const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

let lastSampleTime = 0;
const SAMPLE_INTERVAL = 180; // ms

function startExposureLoop() {
  if (exposureRAF) return;
  const loop = (t) => {
    exposureRAF = requestAnimationFrame(loop);
    if (t - lastSampleTime < SAMPLE_INTERVAL) return;
    lastSampleTime = t;
    sampleExposure();
  };
  exposureRAF = requestAnimationFrame(loop);
}

function sampleExposure() {
  if (!camVideo.videoWidth) return;
  const cw = sampleCanvas.width, ch = sampleCanvas.height;
  try {
    sampleCtx.drawImage(camVideo, 0, 0, cw, ch);
    // Sample center 50% region
    const sx = cw * 0.25, sy = ch * 0.25, sw = cw * 0.5, sh = ch * 0.5;
    const data = sampleCtx.getImageData(sx, sy, sw, sh).data;
    let sum = 0;
    const px = data.length / 4;
    for (let i = 0; i < data.length; i += 4) {
      // Rec. 709 luma
      sum += 0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2];
    }
    const meanLuma = sum / px; // 0..255
    const ratio = Math.max(0.5, meanLuma) / Math.max(0.5, expRefLuma);
    const ev = Math.log2(ratio);
    renderExposure(ev);
  } catch (e) { /* silently ignore frame errors */ }
}

function renderExposure(ev) {
  const clamped = Math.max(-3, Math.min(3, ev));
  const pct = 50 + (clamped / 3) * 50;
  expNeedle.style.left = pct + '%';
  const sign = ev >= 0 ? '+' : '';
  expReadout.textContent = sign + ev.toFixed(1) + ' EV';
  const abs = Math.abs(ev);
  expReadout.style.color = abs < 0.3 ? '#2ade7a' : abs < 1.5 ? '#f5d76e' : '#e85a3a';
}

calibrateBtn.addEventListener('click', () => {
  // Re-read one frame and set that as the new reference
  if (!camVideo.videoWidth) return;
  const cw = sampleCanvas.width, ch = sampleCanvas.height;
  sampleCtx.drawImage(camVideo, 0, 0, cw, ch);
  const sx = cw * 0.25, sy = ch * 0.25, sw = cw * 0.5, sh = ch * 0.5;
  const data = sampleCtx.getImageData(sx, sy, sw, sh).data;
  let sum = 0;
  for (let i = 0; i < data.length; i += 4) {
    sum += 0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2];
  }
  expRefLuma = sum / (data.length / 4);
  saveState();
  // Brief feedback
  calibrateBtn.style.color = '#2ade7a';
  setTimeout(() => { calibrateBtn.style.color = ''; }, 600);
});

/* ============================================================
   SLATE / TAKE CONTROLS
   ============================================================ */
function bumpSlateBtn(direction) {
  const s = parseSlate(slateField.value);
  if (!s) return;
  let idx = variantToIndex(s.variant) + direction;
  if (idx < 0) idx = 0;
  s.variant = indexToVariant(idx);
  slateField.value = formatSlate(s);
  takeField.value = '1';
  saveState();
}

function bumpTakeBtn(direction) {
  let n = parseInt(takeField.value, 10) || 1;
  n = Math.max(1, n + direction);
  takeField.value = String(n);
  saveState();
}

document.getElementById('sl-plus').addEventListener('click', () => bumpSlateBtn(1));
document.getElementById('sl-minus').addEventListener('click', () => bumpSlateBtn(-1));
document.getElementById('tk-plus').addEventListener('click', () => bumpTakeBtn(1));
document.getElementById('tk-minus').addEventListener('click', () => bumpTakeBtn(-1));

// Direct edits are allowed; validate on blur for slate, save on change for both
slateField.addEventListener('blur', () => {
  const s = parseSlate(slateField.value);
  if (!s) {
    // Revert to last saved
    const saved = loadState();
    slateField.value = (saved && saved.slate) || '1-1';
  } else {
    slateField.value = formatSlate(s);
  }
  saveState();
});
slateField.addEventListener('input', () => {
  slateField.value = slateField.value.toUpperCase();
});

takeField.addEventListener('blur', () => {
  let n = parseInt(takeField.value, 10);
  if (isNaN(n) || n < 1) n = 1;
  takeField.value = String(n);
  saveState();
});
takeField.addEventListener('input', () => {
  takeField.value = takeField.value.replace(/\D/g, '');
});

/* ============================================================
   WAKE LOCK — keep screen on during shoot
   ============================================================ */
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (e) { /* ignore */ }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

/* ============================================================
   CLEANUP
   ============================================================ */
window.addEventListener('pagehide', () => {
  if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
  if (exposureRAF) cancelAnimationFrame(exposureRAF);
  if (wakeLock) { try { wakeLock.release(); } catch(e){} }
});

/* ============================================================
   PREVENT DOUBLE-TAP ZOOM ON BUTTONS
   ============================================================ */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

updateStartBtn();
</script>

</body>
</html>
