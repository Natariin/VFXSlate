<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Pocket Wrangler" />
<meta name="theme-color" content="#000000" />
<title>Pocket Wrangler</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23000'/><text x='90' y='110' font-family='monospace' font-size='54' font-weight='bold' fill='%23f5d76e' text-anchor='middle'>PW</text></svg>" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000; color: #fff;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  body {
    width: 100vw; height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: flex; flex-direction: column;
  }

  /* ---- Overlay ---- */
  #overlay {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; z-index: 100; padding: 32px;
  }
  #overlay h1 {
    margin: 0 0 4px;
    font-size: 13px; font-weight: 400;
    color: #f5d76e; letter-spacing: 6px;
  }
  #overlay p {
    margin: 0 0 24px; font-size: 11px; color: #444;
    text-align: center; max-width: 280px; line-height: 1.7;
  }
  .perm-btn {
    background: transparent; color: #555;
    border: 1px solid #222; border-radius: 4px;
    padding: 12px 32px; min-width: 200px;
    font-family: inherit; font-size: 11px; font-weight: 400;
    letter-spacing: 2px; cursor: pointer; touch-action: manipulation;
  }
  .perm-btn:active { color: #888; border-color: #333; }
  .perm-btn.granted { color: #2ade7a; border-color: #1a3a22; }
  .perm-btn.granted::before { content: "✓  "; }
  #start-btn {
    background: #f5d76e; color: #000; border-color: #f5d76e;
    margin-top: 8px; font-weight: 700; letter-spacing: 3px;
  }
  #start-btn:disabled { opacity: 0.15; pointer-events: none; }

  /* ---- App shell ---- */
  #app { display: none; flex: 1; flex-direction: column; height: 100%; }
  #app.visible { display: flex; }

  /* ---- App header ---- */
  .app-header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 10px 20px 6px;
  }
  .app-title {
    font-size: 11px; font-weight: 400;
    color: #f5d76e; letter-spacing: 5px;
    text-transform: uppercase;
  }

  /* ---- Shared field styles ---- */
  .field {
    background: transparent; color: #fff;
    border: none;
    border-bottom: 1px solid #2a2a2a;
    padding: 2px 0 5px;
    font-family: inherit; font-size: 40px; font-weight: 400;
    letter-spacing: 2px;
    outline: none; -webkit-appearance: none;
    min-width: 0; width: 100%;
    -webkit-user-select: text; user-select: text;
  }
  .field:focus { border-bottom-color: #444; }
  #take-field { color: #f5d76e; font-size: 30px; letter-spacing: 1px; }

  /* ---- Shared button styles ---- */
  .btn {
    flex: 1;
    background: transparent; color: #888;
    border: 1px solid #2e2e2e; border-radius: 4px;
    height: 44px; padding: 0;
    font-family: inherit; font-size: 10px; font-weight: 500;
    letter-spacing: 1.5px; cursor: pointer;
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:active { color: #fff; border-color: #555; background: #0f0f0f; }
  .btn.cond { font-size: 9px; letter-spacing: 0.5px; color: #666; }
  .btn.cond:active { color: #f5d76e; }
  .btn-pair { display: flex; gap: 7px; }

  /* ---- Tilt values ---- */
  .tilt-val {
    font-size: 40px; font-weight: 200;
    letter-spacing: -1px;
    color: #2a2a2a;
    transition: color 0.25s;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  /* ===================== LANDSCAPE (default) ===================== */
  .main-row {
    flex: 1 1 auto;
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 8px 20px;
    gap: 20px;
    min-height: 0;
    overflow: hidden;
  }

  .fields-panel {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    justify-content: center; gap: 12px;
    min-width: 0;
  }
  .field-row {
    display: flex; align-items: baseline; gap: 12px;
  }
  .fl {
    font-size: 9px; color: #777;
    letter-spacing: 2px; flex: 0 0 22px;
  }

  .buttons-panel {
    flex: 0 0 130px;
    display: flex; flex-direction: column;
    gap: 6px;
  }

  /* ---- Tilt bar (always at bottom, above credits) ---- */
  .tilt-bar {
    flex: 0 0 auto;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 8px 20px 10px;
    border-top: 1px solid #111;
  }

  /* ---- Credits ---- */
  .credits {
    flex: 0 0 auto;
    text-align: center;
    font-size: 11px; color: #999;
    letter-spacing: 2px;
    padding: 4px 0 8px;
  }

  /* ===================== PORTRAIT ===================== */
  @media (orientation: portrait) {
    .main-row {
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      padding: 12px 24px 8px;
      gap: 22px;
    }
    .fields-panel { gap: 16px; }
    .buttons-panel { flex: 0 0 auto; width: auto; }
    .tilt-val { font-size: 46px; }
  }
</style>
</head>
<body>

<!-- OVERLAY -->
<div id="overlay">
  <h1>POCKET WRANGLER</h1>
  <p>Motion access is needed for the level indicator. Nothing leaves your device.</p>
  <button class="perm-btn" id="motion-btn">Enable level</button>
  <button class="perm-btn" id="start-btn" disabled>Start →</button>
</div>

<!-- APP -->
<div id="app">

  <header class="app-header">
    <span class="app-title">Pocket Wrangler</span>
  </header>

  <div class="main-row">

    <!-- Fields -->
    <div class="fields-panel">
      <div class="field-row">
        <span class="fl">SL</span>
        <input class="field" id="slate-field" value="1-1"
               inputmode="text" autocapitalize="characters"
               autocomplete="off" spellcheck="false" />
      </div>
      <div class="field-row">
        <span class="fl">TK</span>
        <input class="field" id="take-field" value="1"
               inputmode="text" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <!-- Buttons -->
    <div class="buttons-panel">
      <div class="btn-pair">
        <button class="btn" id="sl-minus">SL−</button>
        <button class="btn" id="sl-plus">SL+</button>
      </div>
      <div class="btn-pair">
        <button class="btn" id="tk-minus">TK−</button>
        <button class="btn" id="tk-plus">TK+</button>
      </div>
      <div class="btn-pair">
        <button class="btn cond" id="sunny-btn">Sunny</button>
        <button class="btn cond" id="overcast-btn">Overcast</button>
      </div>
    </div>

  </div>

  <!-- Level display -->
  <div class="tilt-bar">
    <span class="tilt-val" id="tilt-x">—</span>
    <span class="tilt-val" id="tilt-y">—</span>
  </div>

  <div class="credits">made by nadan &nbsp;·&nbsp; v0.2</div>

</div>

<script>
'use strict';

/* ============================================================
   SLATE LOGIC
   ============================================================ */
const SLATE_LETTERS = ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','U','V','W','X','Y','Z'];
const BASE = SLATE_LETTERS.length;

function parseSlate(str) {
  const m = String(str || '').trim().match(/^(\d+)-(\d+)([A-Z]*)$/i);
  if (!m) return null;
  return { ep: parseInt(m[1], 10), scene: parseInt(m[2], 10), variant: (m[3] || '').toUpperCase() };
}
function formatSlate(s) { return s.ep + '-' + s.scene + s.variant; }

function variantToIndex(v) {
  if (!v) return 0;
  let n = 0;
  for (let i = 0; i < v.length; i++) {
    const pos = SLATE_LETTERS.indexOf(v[i]);
    if (pos < 0) return 0;
    n = n * BASE + (pos + 1);
  }
  return n;
}
function indexToVariant(n) {
  if (n <= 0) return '';
  let out = '';
  while (n > 0) {
    const r = (n - 1) % BASE;
    out = SLATE_LETTERS[r] + out;
    n = Math.floor((n - 1) / BASE);
  }
  return out;
}

/* ============================================================
   PERSISTENT STATE
   ============================================================ */
const STORAGE_KEY = 'vfx-slate-state-v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      slate: slateField.value,
      take:  takeField.value
    }));
  } catch (e) {}
}

/* ============================================================
   DOM
   ============================================================ */
const overlay    = document.getElementById('overlay');
const motionBtn  = document.getElementById('motion-btn');
const startBtn   = document.getElementById('start-btn');
const app        = document.getElementById('app');
const slateField = document.getElementById('slate-field');
const takeField  = document.getElementById('take-field');
const tiltElX    = document.getElementById('tilt-x');
const tiltElY    = document.getElementById('tilt-y');

/* ============================================================
   PERMISSIONS
   ============================================================ */
let motionGranted = false;

function updateStartBtn() {
  startBtn.disabled = !motionGranted;
}

motionBtn.addEventListener('click', async () => {
  try {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result === 'granted') {
        attachOrientation();
        motionGranted = true;
        motionBtn.classList.add('granted');
        motionBtn.textContent = 'Level enabled';
      } else {
        motionBtn.textContent = 'Denied — tap to retry';
      }
    } else {
      attachOrientation();
      motionGranted = true;
      motionBtn.classList.add('granted');
      motionBtn.textContent = 'Level enabled';
    }
  } catch (err) {
    motionBtn.textContent = 'Error: ' + err.message;
  }
  updateStartBtn();
});

startBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  app.classList.add('visible');
  requestWakeLock();
  const saved = loadState();
  if (saved) {
    if (saved.slate) slateField.value = saved.slate;
    if (saved.take)  takeField.value  = saved.take;
  }
});

/* ============================================================
   ORIENTATION → TILT DISPLAY
   ============================================================ */
const TILT_ALPHA = 0.12;
let smoothX = 0, smoothY = 0, tiltReady = false;

function attachOrientation() {
  window.addEventListener('deviceorientation', onOrientation, true);
}

function onOrientation(e) {
  const angle  = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
  const rad    = (angle * Math.PI) / 180;
  const cos    = Math.cos(rad);
  const sin    = Math.sin(rad);
  const rawX   = -(e.gamma || 0);
  const rawY   = -(e.beta  || 0);
  const inputX = rawX * cos + rawY * sin;
  const inputY = -rawX * sin + rawY * cos;

  if (!tiltReady) {
    smoothX = inputX; smoothY = inputY; tiltReady = true;
  } else {
    smoothX += TILT_ALPHA * (inputX - smoothX);
    smoothY += TILT_ALPHA * (inputY - smoothY);
  }

  renderTilt(smoothX, smoothY);
}

function renderTilt(tiltX, tiltY) {
  const total = Math.sqrt(tiltX * tiltX + tiltY * tiltY);
  const color = total < 0.5 ? '#2ade7a'
              : total < 2   ? '#f5d76e'
              :                '#e85a3a';

  tiltElX.textContent = (tiltX >= 0 ? '+' : '') + tiltX.toFixed(1) + '°';
  tiltElY.textContent = (tiltY >= 0 ? '+' : '') + tiltY.toFixed(1) + '°';
  tiltElX.style.color = color;
  tiltElY.style.color = color;
}

/* ============================================================
   SLATE / TAKE CONTROLS
   ============================================================ */
function bumpSlateBtn(direction) {
  const s = parseSlate(slateField.value);
  if (!s) return;
  let idx = variantToIndex(s.variant) + direction;
  if (idx < 0) idx = 0;
  s.variant = indexToVariant(idx);
  slateField.value = formatSlate(s);
  takeField.value = '1';
  saveState();
}

function bumpTakeBtn(direction) {
  const val = takeField.value.trim();
  let n = parseInt(val, 10);
  if (isNaN(n)) {
    n = 1;
  } else {
    n = Math.max(1, n + direction);
  }
  takeField.value = String(n);
  saveState();
}

document.getElementById('sl-plus').addEventListener('click',      () => bumpSlateBtn(1));
document.getElementById('sl-minus').addEventListener('click',     () => bumpSlateBtn(-1));
document.getElementById('tk-plus').addEventListener('click',      () => bumpTakeBtn(1));
document.getElementById('tk-minus').addEventListener('click',     () => bumpTakeBtn(-1));
document.getElementById('sunny-btn').addEventListener('click',    () => { takeField.value = 'Sunny';    saveState(); });
document.getElementById('overcast-btn').addEventListener('click', () => { takeField.value = 'Overcast'; saveState(); });

slateField.addEventListener('input', () => {
  slateField.value = slateField.value.toUpperCase();
});
slateField.addEventListener('blur', () => {
  const s = parseSlate(slateField.value);
  if (!s) {
    const saved = loadState();
    slateField.value = (saved && saved.slate) || '1-1';
  } else {
    slateField.value = formatSlate(s);
  }
  saveState();
});

takeField.addEventListener('blur', () => {
  const val = takeField.value.trim();
  if (val === 'Sunny' || val === 'Overcast') return;
  let n = parseInt(val, 10);
  if (isNaN(n) || n < 1) n = 1;
  takeField.value = String(n);
  saveState();
});

/* ============================================================
   WAKE LOCK
   ============================================================ */
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

/* ============================================================
   CLEANUP
   ============================================================ */
window.addEventListener('pagehide', () => {
  if (wakeLock) { try { wakeLock.release(); } catch(e){} }
});
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick',     e => e.preventDefault());

updateStartBtn();
</script>
</body>
</html>
