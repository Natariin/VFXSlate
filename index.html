<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Slate" />
<meta name="theme-color" content="#000000" />
<title>VFX Slate</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23000'/><text x='90' y='115' font-family='monospace' font-size='80' font-weight='bold' fill='%23f5d76e' text-anchor='middle'>SL</text></svg>" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000; color: #fff;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  body {
    width: 100vw; height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: flex; flex-direction: column;
  }

  /* ---- Permission overlay ---- */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.95);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    z-index: 100;
    padding: 20px;
  }
  #overlay h1 {
    margin: 0 0 4px; font-size: 18px; font-weight: 500;
    color: #f5d76e; letter-spacing: 2px;
  }
  #overlay p {
    margin: 0 0 16px; font-size: 12px; color: #888;
    text-align: center; max-width: 400px; line-height: 1.5;
  }
  .perm-btn {
    background: #1a1a1a; color: #fff;
    border: 1px solid #333; border-radius: 8px;
    padding: 14px 28px; min-width: 240px;
    font-family: inherit; font-size: 14px; font-weight: 500;
    letter-spacing: 1px; cursor: pointer;
    touch-action: manipulation;
  }
  .perm-btn:active { background: #2a2a2a; transform: scale(0.98); }
  .perm-btn.granted { background: #0a3a1a; border-color: #2a8a4a; color: #2ade7a; }
  .perm-btn.granted::before { content: "✓ "; }
  #start-btn {
    background: #f5d76e; color: #000; border-color: #f5d76e;
    margin-top: 8px; font-weight: 700;
  }
  #start-btn:disabled { opacity: 0.3; }

  /* ---- Main app ---- */
  #app { display: none; flex: 1; flex-direction: column; width: 100%; height: 100%; }
  #app.visible { display: flex; }

  /* 3-column main row */
  .main-row {
    flex: 1 1 auto;
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 10px 12px;
    gap: 12px;
    min-height: 0;
    overflow: hidden;
  }

  /* Left panel: slate + take fields */
  .fields-panel {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
    min-width: 150px;
    max-width: 210px;
  }
  .field-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .field-label {
    font-size: 9px; color: #555;
    letter-spacing: 2px; padding-left: 4px;
  }
  .field {
    background: #0a0a0a; color: #fff;
    border: 1px solid #2a2a2a; border-radius: 8px;
    height: 68px; padding: 0 10px;
    font-family: inherit; font-size: 38px; font-weight: 600;
    letter-spacing: 3px; text-align: center;
    outline: none; -webkit-appearance: none;
    width: 100%;
  }
  .field:focus { border-color: #f5d76e; }
  #take-field { color: #f5d76e; }

  /* Center panel: circular bubble level */
  .level-panel {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-width: 0;
    min-height: 0;
  }
  .bubble-vial {
    position: relative;
    width: min(210px, calc(100dvh - 140px));
    height: min(210px, calc(100dvh - 140px));
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #1c1c1c 0%, #060606 65%);
    border: 2px solid #252525;
    overflow: hidden;
    box-shadow:
      inset 0 2px 14px rgba(0,0,0,0.95),
      inset 0 0 0 1px rgba(255,255,255,0.03),
      0 0 24px rgba(0,0,0,0.6);
  }
  /* Inner ring texture */
  .bubble-vial::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 1px solid #161616;
    pointer-events: none;
  }
  /* Faint crosshair lines */
  .bubble-line-h, .bubble-line-v {
    position: absolute;
    background: #1e3326;
    pointer-events: none;
  }
  .bubble-line-h {
    width: 58%; height: 1px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .bubble-line-v {
    width: 1px; height: 58%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  /* Target ring (the "level zone") */
  .bubble-target-ring {
    position: absolute;
    width: 27%; height: 27%;
    border: 1px dashed #2a8a4a;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.55;
    pointer-events: none;
  }
  /* The bubble ball */
  #bubble {
    position: absolute;
    width: 23%; height: 23%;
    border-radius: 50%;
    background: #f5d76e;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: top 0.08s ease-out, left 0.08s ease-out, background 0.15s;
    box-shadow:
      0 0 10px rgba(245,215,110,0.55),
      inset 0 1px 4px rgba(255,255,255,0.35),
      inset 0 -1px 3px rgba(0,0,0,0.4);
  }
  .tilt-readout {
    font-size: 10px; color: #3a3a3a;
    letter-spacing: 1px;
  }

  /* Right panel: buttons */
  .buttons-panel {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: stretch;
    gap: 7px;
    min-width: 58px;
    width: 62px;
  }
  .btn-divider { height: 8px; }
  .btn {
    background: #111; color: #ddd;
    border: 1px solid #252525; border-radius: 8px;
    height: 52px; padding: 0 6px;
    font-family: inherit; font-size: 12px; font-weight: 600;
    letter-spacing: 0.5px; cursor: pointer;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
    -webkit-user-select: none; user-select: none;
  }
  .btn:active { background: #222; transform: scale(0.95); }
  #calibrate-btn {
    font-size: 10px; color: #444;
    background: #080808; border-color: #1a1a1a;
    height: 38px;
    margin-top: 2px;
    letter-spacing: 1px;
  }
  #calibrate-btn:active { color: #f5d76e; background: #0f0f0f; }

  /* Exposure row */
  .exposure-row {
    flex: 0 0 auto;
    padding: 5px 12px 5px;
    border-top: 1px solid #111;
  }
  .exp-line {
    display: flex; align-items: center; gap: 8px;
  }
  .exp-label { font-size: 9px; color: #555; letter-spacing: 1px; }
  .exp-bar {
    flex: 1; height: 14px;
    background: linear-gradient(to right,
      #1a1a3a 0%, #1a1a1a 25%, #1a3a1a 45%,
      #2a6a2a 50%, #1a3a1a 55%, #1a1a1a 75%, #3a1a1a 100%);
    border: 1px solid #1e1e1e;
    border-radius: 7px;
    position: relative;
  }
  .exp-center {
    position: absolute; left: 50%; top: -3px;
    width: 1px; height: 20px;
    background: #3a3a3a;
    transform: translateX(-50%);
  }
  #exp-needle {
    position: absolute; left: 50%; top: -4px;
    width: 2px; height: 22px;
    background: #fff;
    transform: translateX(-50%);
    transition: left 0.15s ease-out;
    box-shadow: 0 0 3px rgba(255,255,255,0.7);
  }
  #exp-readout {
    font-size: 11px; color: #f5d76e;
    min-width: 60px; text-align: right;
    letter-spacing: 0.5px;
  }
  .exp-scale {
    display: flex; justify-content: space-between;
    font-size: 7px; color: #2e2e2e;
    padding: 1px 28px 0;
  }

  /* Credits */
  .credits {
    text-align: center;
    font-size: 8px; color: #222;
    letter-spacing: 3px;
    padding: 2px 0 4px;
  }

  #cam-video { display: none; }
</style>
</head>
<body>

<!-- ============ PERMISSION OVERLAY ============ -->
<div id="overlay">
  <h1>VFX SLATE</h1>
  <p>This app needs motion and camera access to work as a level and light meter. Both stay on-device — nothing is recorded or sent anywhere.</p>

  <button class="perm-btn" id="motion-btn">Enable level (motion)</button>
  <button class="perm-btn" id="camera-btn">Enable meter (camera)</button>

  <button class="perm-btn" id="start-btn" disabled>Start →</button>
</div>

<!-- ============ MAIN APP ============ -->
<div id="app">

  <div class="main-row">

    <!-- Left: slate + take fields -->
    <div class="fields-panel">
      <div class="field-group">
        <span class="field-label">SLATE</span>
        <input class="field" id="slate-field" value="1-1" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field-group">
        <span class="field-label">TAKE</span>
        <input class="field" id="take-field" value="1" inputmode="numeric" autocomplete="off" />
      </div>
    </div>

    <!-- Center: circular 2D bubble level -->
    <div class="level-panel">
      <div class="bubble-vial">
        <div class="bubble-line-h"></div>
        <div class="bubble-line-v"></div>
        <div class="bubble-target-ring"></div>
        <div id="bubble"></div>
      </div>
      <div class="tilt-readout" id="tilt-readout">—</div>
    </div>

    <!-- Right: buttons -->
    <div class="buttons-panel">
      <button class="btn" id="sl-plus" aria-label="Next slate">SL+</button>
      <button class="btn" id="sl-minus" aria-label="Previous slate">SL−</button>
      <div class="btn-divider"></div>
      <button class="btn" id="tk-plus" aria-label="Next take">TK+</button>
      <button class="btn" id="tk-minus" aria-label="Previous take">TK−</button>
      <button class="btn" id="calibrate-btn" title="Set current light as 0 EV reference">CAL</button>
    </div>

  </div>

  <!-- Exposure meter -->
  <div class="exposure-row">
    <div class="exp-line">
      <span class="exp-label">EXP</span>
      <div class="exp-bar">
        <div class="exp-center"></div>
        <div id="exp-needle"></div>
      </div>
      <span id="exp-readout">—</span>
    </div>
    <div class="exp-scale">
      <span>−3</span><span>−2</span><span>−1</span><span>0</span><span>+1</span><span>+2</span><span>+3</span>
    </div>
  </div>

  <div class="credits">made by nadan</div>

  <video id="cam-video" autoplay playsinline muted></video>
</div>

<script>
'use strict';

/* ============================================================
   SLATE LOGIC — pure functions, alphabet skips I and O
   ============================================================ */
const SLATE_LETTERS = ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','U','V','W','X','Y','Z'];
const BASE = SLATE_LETTERS.length; // 24

function parseSlate(str) {
  const m = String(str || '').trim().match(/^(\d+)-(\d+)([A-Z]*)$/i);
  if (!m) return null;
  return { ep: parseInt(m[1], 10), scene: parseInt(m[2], 10), variant: (m[3] || '').toUpperCase() };
}
function formatSlate(s) { return s.ep + '-' + s.scene + s.variant; }

function variantToIndex(v) {
  if (!v) return 0;
  let n = 0;
  for (let i = 0; i < v.length; i++) {
    const pos = SLATE_LETTERS.indexOf(v[i]);
    if (pos < 0) return 0;
    n = n * BASE + (pos + 1);
  }
  return n;
}
function indexToVariant(n) {
  if (n <= 0) return '';
  let out = '';
  while (n > 0) {
    const r = (n - 1) % BASE;
    out = SLATE_LETTERS[r] + out;
    n = Math.floor((n - 1) / BASE);
  }
  return out;
}

/* ============================================================
   PERSISTENT STATE
   ============================================================ */
const STORAGE_KEY = 'vfx-slate-state-v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      slate: slateField.value,
      take: takeField.value,
      expRef: expRefLuma
    }));
  } catch (e) {}
}

/* ============================================================
   DOM REFS
   ============================================================ */
const overlay     = document.getElementById('overlay');
const motionBtn   = document.getElementById('motion-btn');
const cameraBtn   = document.getElementById('camera-btn');
const startBtn    = document.getElementById('start-btn');
const app         = document.getElementById('app');

const slateField    = document.getElementById('slate-field');
const takeField     = document.getElementById('take-field');
const bubble        = document.getElementById('bubble');
const tiltReadout   = document.getElementById('tilt-readout');
const expNeedle     = document.getElementById('exp-needle');
const expReadout    = document.getElementById('exp-readout');
const calibrateBtn  = document.getElementById('calibrate-btn');
const camVideo      = document.getElementById('cam-video');

/* ============================================================
   PERMISSION FLOWS
   ============================================================ */
let motionGranted = false;
let cameraGranted = false;
let cameraStream  = null;

function updateStartBtn() {
  startBtn.disabled = !(motionGranted || cameraGranted);
  startBtn.textContent = (motionGranted && cameraGranted) ? 'Start →' : 'Start anyway →';
}

motionBtn.addEventListener('click', async () => {
  try {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result === 'granted') {
        attachOrientation();
        motionGranted = true;
        motionBtn.classList.add('granted');
        motionBtn.textContent = 'Level enabled';
      } else {
        motionBtn.textContent = 'Motion denied — tap to retry';
      }
    } else {
      attachOrientation();
      motionGranted = true;
      motionBtn.classList.add('granted');
      motionBtn.textContent = 'Level enabled';
    }
  } catch (err) {
    motionBtn.textContent = 'Error: ' + err.message;
  }
  updateStartBtn();
});

cameraBtn.addEventListener('click', async () => {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 320 },
        height: { ideal: 240 }
      },
      audio: false
    });
    camVideo.srcObject = cameraStream;
    await camVideo.play();
    cameraGranted = true;
    cameraBtn.classList.add('granted');
    cameraBtn.textContent = 'Meter enabled';
    startExposureLoop();
  } catch (err) {
    cameraBtn.textContent = 'Camera denied — tap to retry';
  }
  updateStartBtn();
});

startBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  app.classList.add('visible');
  requestWakeLock();
  // Try to lock landscape orientation
  try { screen.orientation.lock('landscape').catch(() => {}); } catch(e) {}
  const saved = loadState();
  if (saved) {
    if (saved.slate) slateField.value = saved.slate;
    if (saved.take)  takeField.value  = saved.take;
    if (typeof saved.expRef === 'number') expRefLuma = saved.expRef;
  }
});

/* ============================================================
   ORIENTATION → 2D BUBBLE LEVEL
   ============================================================ */
function attachOrientation() {
  window.addEventListener('deviceorientation', onOrientation, true);
}

function onOrientation(e) {
  // gamma: left-right tilt (-90..90), beta: front-back tilt (-180..180)
  // Bubble moves away from the low side (inverted from tilt direction)
  const gamma = e.gamma || 0;
  const beta  = e.beta  || 0;

  // Rotate axes to match current screen orientation
  const angle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
  const rad = (angle * Math.PI) / 180;
  const cos = Math.cos(rad);
  const sin = Math.sin(rad);

  // Raw tilt (inverted so bubble opposes gravity)
  const rawX = -gamma;
  const rawY = -beta;

  const tiltX = rawX * cos + rawY * sin;
  const tiltY = -rawX * sin + rawY * cos;

  renderBubble(tiltX, tiltY);
}

function renderBubble(tiltX, tiltY) {
  const MAX_DEG  = 15;
  const MAX_MOVE = 35; // % from center, keeps bubble inside vial

  let pctX = Math.max(-MAX_DEG, Math.min(MAX_DEG, tiltX)) / MAX_DEG * MAX_MOVE;
  let pctY = Math.max(-MAX_DEG, Math.min(MAX_DEG, tiltY)) / MAX_DEG * MAX_MOVE;

  // Clamp to circular boundary
  const dist = Math.sqrt(pctX * pctX + pctY * pctY);
  if (dist > MAX_MOVE) {
    pctX = (pctX / dist) * MAX_MOVE;
    pctY = (pctY / dist) * MAX_MOVE;
  }

  bubble.style.left = (50 + pctX) + '%';
  bubble.style.top  = (50 + pctY) + '%';

  const totalTilt = Math.sqrt(tiltX * tiltX + tiltY * tiltY);
  const isLevel   = totalTilt < 0.5;
  const isClose   = totalTilt < 2;
  const color     = isLevel ? '#2ade7a' : isClose ? '#f5d76e' : '#e85a3a';
  const glow      = isLevel ? 'rgba(42,222,122,0.55)'
                  : isClose ? 'rgba(245,215,110,0.45)'
                  :           'rgba(232,90,58,0.45)';

  bubble.style.background = color;
  bubble.style.boxShadow  =
    `0 0 10px ${glow}, inset 0 1px 4px rgba(255,255,255,0.35), inset 0 -1px 3px rgba(0,0,0,0.4)`;

  const xStr = (tiltX >= 0 ? '+' : '') + tiltX.toFixed(1);
  const yStr = (tiltY >= 0 ? '+' : '') + tiltY.toFixed(1);
  tiltReadout.textContent = `${xStr}°  ${yStr}°`;
}

/* ============================================================
   CAMERA LUMINANCE → EXPOSURE METER
   ============================================================ */
let expRefLuma = 128;
let exposureRAF = null;
const sampleCanvas = document.createElement('canvas');
sampleCanvas.width = 80; sampleCanvas.height = 60;
const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

let lastSampleTime = 0;
const SAMPLE_INTERVAL = 180;

function startExposureLoop() {
  if (exposureRAF) return;
  const loop = (t) => {
    exposureRAF = requestAnimationFrame(loop);
    if (t - lastSampleTime < SAMPLE_INTERVAL) return;
    lastSampleTime = t;
    sampleExposure();
  };
  exposureRAF = requestAnimationFrame(loop);
}

function sampleExposure() {
  if (!camVideo.videoWidth) return;
  const cw = sampleCanvas.width, ch = sampleCanvas.height;
  try {
    sampleCtx.drawImage(camVideo, 0, 0, cw, ch);
    const sx = cw * 0.25, sy = ch * 0.25, sw = cw * 0.5, sh = ch * 0.5;
    const data = sampleCtx.getImageData(sx, sy, sw, sh).data;
    let sum = 0;
    const px = data.length / 4;
    for (let i = 0; i < data.length; i += 4) {
      sum += 0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2];
    }
    const meanLuma = sum / px;
    const ratio = Math.max(0.5, meanLuma) / Math.max(0.5, expRefLuma);
    const ev = Math.log2(ratio);
    renderExposure(ev);
  } catch (e) {}
}

function renderExposure(ev) {
  const clamped = Math.max(-3, Math.min(3, ev));
  const pct = 50 + (clamped / 3) * 50;
  expNeedle.style.left = pct + '%';
  const sign = ev >= 0 ? '+' : '';
  expReadout.textContent = sign + ev.toFixed(1) + ' EV';
  const abs = Math.abs(ev);
  expReadout.style.color = abs < 0.3 ? '#2ade7a' : abs < 1.5 ? '#f5d76e' : '#e85a3a';
}

calibrateBtn.addEventListener('click', () => {
  if (!camVideo.videoWidth) return;
  const cw = sampleCanvas.width, ch = sampleCanvas.height;
  sampleCtx.drawImage(camVideo, 0, 0, cw, ch);
  const sx = cw * 0.25, sy = ch * 0.25, sw = cw * 0.5, sh = ch * 0.5;
  const data = sampleCtx.getImageData(sx, sy, sw, sh).data;
  let sum = 0;
  for (let i = 0; i < data.length; i += 4) {
    sum += 0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2];
  }
  expRefLuma = sum / (data.length / 4);
  saveState();
  calibrateBtn.style.color = '#2ade7a';
  setTimeout(() => { calibrateBtn.style.color = ''; }, 600);
});

/* ============================================================
   SLATE / TAKE CONTROLS
   ============================================================ */
function bumpSlateBtn(direction) {
  const s = parseSlate(slateField.value);
  if (!s) return;
  let idx = variantToIndex(s.variant) + direction;
  if (idx < 0) idx = 0;
  s.variant = indexToVariant(idx);
  slateField.value = formatSlate(s);
  takeField.value = '1';
  saveState();
}

function bumpTakeBtn(direction) {
  let n = parseInt(takeField.value, 10) || 1;
  n = Math.max(1, n + direction);
  takeField.value = String(n);
  saveState();
}

document.getElementById('sl-plus').addEventListener('click', () => bumpSlateBtn(1));
document.getElementById('sl-minus').addEventListener('click', () => bumpSlateBtn(-1));
document.getElementById('tk-plus').addEventListener('click', () => bumpTakeBtn(1));
document.getElementById('tk-minus').addEventListener('click', () => bumpTakeBtn(-1));

slateField.addEventListener('blur', () => {
  const s = parseSlate(slateField.value);
  if (!s) {
    const saved = loadState();
    slateField.value = (saved && saved.slate) || '1-1';
  } else {
    slateField.value = formatSlate(s);
  }
  saveState();
});
slateField.addEventListener('input', () => {
  slateField.value = slateField.value.toUpperCase();
});

takeField.addEventListener('blur', () => {
  let n = parseInt(takeField.value, 10);
  if (isNaN(n) || n < 1) n = 1;
  takeField.value = String(n);
  saveState();
});
takeField.addEventListener('input', () => {
  takeField.value = takeField.value.replace(/\D/g, '');
});

/* ============================================================
   WAKE LOCK
   ============================================================ */
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

/* ============================================================
   CLEANUP
   ============================================================ */
window.addEventListener('pagehide', () => {
  if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
  if (exposureRAF)  cancelAnimationFrame(exposureRAF);
  if (wakeLock)     { try { wakeLock.release(); } catch(e){} }
});

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick',     e => e.preventDefault());

updateStartBtn();
</script>

</body>
</html>
