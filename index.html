<html lang="en">
<head>

<title>VFX Slate</title>

<!-- Icon: a stylized clapperboard -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230b0b0d'/><rect x='3' y='10' width='26' height='19' rx='3' fill='%23e8e4d9'/><rect x='3' y='6' width='26' height='6' rx='2' fill='%23111'/><line x1='3' y1='9' x2='10' y2='6' stroke='%23e8e4d9' stroke-width='2'/><line x1='12' y1='9' x2='19' y2='6' stroke='%23e8e4d9' stroke-width='2'/><line x1='21' y1='9' x2='28' y2='6' stroke='%23e8e4d9' stroke-width='2'/><text x='16' y='24' font-family='monospace' font-size='8' font-weight='900' fill='%230b0b0d' text-anchor='middle'>SLATE</text></svg>" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230b0b0d'/><rect x='14' y='56' width='152' height='110' rx='14' fill='%23e8e4d9'/><rect x='14' y='34' width='152' height='34' rx='10' fill='%231a1a1f'/><line x1='14' y1='52' x2='54' y2='34' stroke='%23e8e4d9' stroke-width='10'/><line x1='68' y1='52' x2='108' y2='34' stroke='%23e8e4d9' stroke-width='10'/><line x1='122' y1='52' x2='162' y2='34' stroke='%23e8e4d9' stroke-width='10'/><text x='90' y='130' font-family='monospace' font-size='44' font-weight='900' fill='%230b0b0d' text-anchor='middle'>SL</text><text x='90' y='158' font-family='monospace' font-size='18' font-weight='700' fill='%230b0b0d55' text-anchor='middle'>POCKET</text></svg>" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap');

  :root {
    --bg:        #0b0b0d;
    --bg2:       #111116;
    --bg3:       #18181f;
    --border:    #242430;
    --border2:   #2e2e3e;
    --text:      #e8e4d9;
    --muted:     #5a5a72;
    --dim:       #30303f;
    --gold:      #f0c040;
    --gold-dim:  #f0c04022;
    --green:     #3ddba0;
    --yellow:    #f5c842;
    --red:       #f05050;
    --font-mono: 'DM Mono', ui-monospace, monospace;
    --font-disp: 'Bebas Neue', impact, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: var(--font-mono);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  body {
    width: 100vw; height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: flex; flex-direction: column;
  }

  /* ========== OVERLAY ========== */
  #overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0; z-index: 100; padding: 40px 32px;
  }

  /* Clapperboard SVG logo */
  .logo-wrap {
    margin-bottom: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .logo-board {
    width: 72px; height: 60px;
    position: relative;
  }
  .logo-board svg { width: 100%; height: 100%; }

  .logo-title {
    font-family: var(--font-disp);
    font-size: 32px;
    letter-spacing: 6px;
    color: var(--text);
    text-transform: uppercase;
  }
  .logo-sub {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: -6px;
  }

  #overlay p {
    margin: 0 0 28px; font-size: 11px; color: var(--muted);
    text-align: center; max-width: 260px; line-height: 1.8;
    letter-spacing: 0.5px;
  }
  .perm-btn {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 14px 32px; min-width: 220px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    letter-spacing: 3px; cursor: pointer; touch-action: manipulation;
    transition: all 0.2s; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .perm-btn:active { color: var(--text); border-color: var(--border2); background: var(--bg3); }
  .perm-btn.granted { color: var(--green); border-color: var(--green); background: #3ddba011; }
  .perm-btn.granted::before { content: "✓  "; }
  #start-btn {
    background: var(--gold); color: #000; border-color: var(--gold);
    font-weight: 700; letter-spacing: 4px;
    margin-bottom: 0;
  }
  #start-btn:disabled { opacity: 0.12; pointer-events: none; }
  #start-btn:not(:disabled):active { background: #d4a830; border-color: #d4a830; }

  /* ========== APP SHELL ========== */
  #app { display: none; flex: 1; flex-direction: column; height: 100%; }
  #app.visible { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  /* ========== HEADER ========== */
  .app-header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 10px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .header-logo {
    display: flex; align-items: center; gap: 9px;
  }
  .header-clap {
    width: 28px; height: 22px; flex: 0 0 auto;
  }
  .header-clap svg { width: 100%; height: 100%; }
  .header-title {
    font-family: var(--font-disp);
    font-size: 20px; letter-spacing: 4px;
    color: var(--text); line-height: 1;
  }
  .header-version {
    font-size: 9px; color: var(--dim);
    letter-spacing: 2px; text-transform: uppercase;
  }

  /* Level pill in header */
  .level-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 20px;
    background: var(--bg3); border: 1px solid var(--border);
    min-width: 120px; justify-content: center;
  }
  .level-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
    flex: 0 0 auto;
  }
  .level-readout {
    font-size: 11px; font-weight: 500; letter-spacing: 1px;
    color: var(--muted); font-variant-numeric: tabular-nums;
    transition: color 0.3s;
    white-space: nowrap;
  }

  /* ========== MAIN CONTENT ========== */
  .main-row {
    flex: 1 1 auto;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    min-height: 0;
    overflow: hidden;
  }

  /* ---- Fields panel ---- */
  .fields-panel {
    flex: 1 1 auto;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 24px 24px 20px;
    gap: 0;
    border-right: 1px solid var(--border);
  }

  .field-block {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 16px 0;
  }
  .field-block + .field-block {
    border-top: 1px solid var(--border);
  }

  .fl {
    font-size: 9px; font-weight: 500;
    color: var(--muted); letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 4px;

  .field {

    border: none; outline: none;
    padding: 0;
    font-family: var(--font-disp);
    font-size: 64px; line-height: 1;
    letter-spacing: 2px;

    min-width: 0; width: 100%;
    -webkit-user-select: text; user-select: text;

  .field::placeholder { color: var(--dim); }
  .field:focus { color: var(--text); }

    flex: 0 0 148px;
    display: flex; flex-direction: column;
    padding: 12px 10px;
    gap: 6px;
    justify-content: center;
  }

  .btn-section-label {
    font-size: 8px; color: var(--dim);
    letter-spacing: 3px; text-transform: uppercase;
    text-align: center; padding: 2px 0;
  }

  .btn {
    flex: 1;

    padding: 0; min-height: 52px;

    touch-action: manipulation;

  .btn.reset {
    color: var(--dim);

  .btn.reset:active { color: var(--red); border-color: #f0505055; background: #f0505011; }

  /* ---- History log ---- */
  .history-panel {
    flex: 0 0 auto;
    display: flex; flex-direction: column;
    border-top: 1px solid var(--border);
    max-height: 100px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 20px 4px;
  }
  .history-title {
    font-size: 8px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase;
  }
  .history-clear-btn {
    background: none; border: none; color: var(--dim); font-family: var(--font-mono);
    font-size: 8px; letter-spacing: 2px; cursor: pointer; padding: 0;
    touch-action: manipulation; text-transform: uppercase;
  }
  .history-clear-btn:active { color: var(--red); }
  .history-list {
    display: flex; flex-direction: column-reverse;
    padding: 0 20px 8px; gap: 2px;
  }
  .history-item {
    display: flex; align-items: baseline; gap: 10px;
    font-size: 10px; color: var(--muted); letter-spacing: 1px;
    animation: slideIn 0.2s ease;

  @keyframes slideIn { from { opacity: 0; transform: translateY(-4px) } to { opacity: 1; transform: none } }
  .history-sl { color: var(--text); font-weight: 500; }
  .history-tk { color: var(--gold); }
  .history-time { color: var(--dim); font-size: 9px; margin-left: auto; }

  /* ---- Credits ---- */
  .credits {
    flex: 0 0 auto;
    text-align: center;
    font-size: 9px; color: var(--dim);
    letter-spacing: 2px;
    padding: 5px 0 6px;
    border-top: 1px solid var(--border);

  /* ========== PORTRAIT ========== */
  @media (orientation: portrait) {
    .main-row {

    }
    .fields-panel {
      flex: 1 1 auto;
      border-right: none;
      padding: 20px 24px 12px;
    }
    .field { font-size: 72px; }
    .buttons-panel {
      flex: 0 0 auto;

      flex-wrap: wrap;
      padding: 10px 12px;

      min-height: 0;

    .sl-group, .tk-group {

    .cond-group {

    .btn-section-label { display: none; }

  /* ========== LANDSCAPE ========== */
  @media (orientation: landscape) {
    .sl-group, .tk-group { display: contents; }
    .cond-group { display: contents; }
    .reset-group { display: contents; }
  }

    0%   { opacity: 1 }
    50%  { opacity: 0.5 }
    100% { opacity: 1 }
  }
  .tapped { animation: tapFlash 0.1s ease; }
</style>

<script>
'use strict';

/* =====================================================================
   SLATE LOGIC
   ===================================================================== */
const SLATE_LETTERS = ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','U','V','W','X','Y','Z'];
const BASE = SLATE_LETTERS.length;

function parseSlate(str) {
  const m = String(str || '').trim().match(/^(\d+)-([A-Z]*\d+)([A-Z]*)$/i);
  if (!m) return null;
  return { ep: parseInt(m[1], 10), scene: m[2].toUpperCase(), variant: (m[3] || '').toUpperCase() };
}
function formatSlate(s) { return s.ep + '-' + s.scene + s.variant; }

function variantToIndex(v) {
  if (!v) return 0;
  let n = 0;
  for (let i = 0; i < v.length; i++) {
    const pos = SLATE_LETTERS.indexOf(v[i]);
    if (pos < 0) return 0;
    n = n * BASE + (pos + 1);
  }
  return n;
}
function indexToVariant(n) {
  if (n <= 0) return '';
  let out = '';
  while (n > 0) {
    const r = (n - 1) % BASE;
    out = SLATE_LETTERS[r] + out;
    n = Math.floor((n - 1) / BASE);
  }
  return out;
}

/* =====================================================================
   PERSISTENT STATE
   ===================================================================== */
const STORAGE_KEY = 'vfx-slate-state-v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      slate:   slateField.value,
      take:    takeField.value,
      history: history.slice(0, 30)
    }));
  } catch (e) {}
}

/* =====================================================================
   DOM REFS
   ===================================================================== */
const overlay       = document.getElementById('overlay');
const motionBtn     = document.getElementById('motion-btn');
const startBtn      = document.getElementById('start-btn');
const app           = document.getElementById('app');
const slateField    = document.getElementById('slate-field');
const takeField     = document.getElementById('take-field');
const slateHint     = document.getElementById('slate-hint');
const takeHint      = document.getElementById('take-hint');
const levelDot      = document.getElementById('level-dot');
const levelReadout  = document.getElementById('level-readout');
const historyList   = document.getElementById('history-list');
const clearHistBtn  = document.getElementById('clear-history-btn');

/* =====================================================================
   PERMISSIONS
   ===================================================================== */
let motionGranted = false;

function updateStartBtn() {
  startBtn.disabled = !motionGranted;
}

motionBtn.addEventListener('click', async () => {
  try {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result === 'granted') {
        attachOrientation();
        motionGranted = true;
        motionBtn.classList.add('granted');
        motionBtn.textContent = 'Level enabled';
      } else {
        motionBtn.textContent = 'Denied — tap to retry';
      }
    } else {
      attachOrientation();
      motionGranted = true;
      motionBtn.classList.add('granted');
      motionBtn.textContent = 'Level enabled';
    }
  } catch (err) {
    motionBtn.textContent = 'Error: ' + err.message;
  }
  updateStartBtn();
});

startBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  app.classList.add('visible');
  requestWakeLock();
  const saved = loadState();
  if (saved) {
    if (saved.slate)   slateField.value = saved.slate;
    if (saved.take)    takeField.value  = saved.take;
    if (saved.history) { history = saved.history; renderHistory(); }
  }
});

/* =====================================================================
   ORIENTATION → LEVEL DISPLAY
   ===================================================================== */
const TILT_ALPHA = 0.12;
let smoothX = 0, smoothY = 0, tiltReady = false;

function attachOrientation() {
  window.addEventListener('deviceorientation', onOrientation, true);
}

function onOrientation(e) {
  const angle  = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
  const rad    = (angle * Math.PI) / 180;
  const cos    = Math.cos(rad);
  const sin    = Math.sin(rad);
  const rawX   = -(e.gamma || 0);
  const rawY   = -(e.beta  || 0);
  const inputX = rawX * cos + rawY * sin;
  const inputY = -rawX * sin + rawY * cos;

  if (!tiltReady) {
    smoothX = inputX; smoothY = inputY; tiltReady = true;
  } else {
    smoothX += TILT_ALPHA * (inputX - smoothX);
    smoothY += TILT_ALPHA * (inputY - smoothY);
  }
  renderLevel(smoothX, smoothY);
}

function renderLevel(tiltX, tiltY) {
  const total = Math.sqrt(tiltX * tiltX + tiltY * tiltY);
  const color = total < 0.5 ? 'var(--green)'
              : total < 2   ? 'var(--yellow)'
              :                'var(--red)';
  levelDot.style.background = color;
  levelReadout.style.color  = color;
  levelReadout.textContent  =
    (tiltX >= 0 ? '+' : '') + tiltX.toFixed(1) + '°  ' +
    (tiltY >= 0 ? '+' : '') + tiltY.toFixed(1) + '°';
}

/* =====================================================================
   HISTORY LOG
   ===================================================================== */
let history = [];

function addHistory(sl, tk) {
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' +
               now.getMinutes().toString().padStart(2,'0');
  history.unshift({ sl, tk, time });
  if (history.length > 30) history.pop();
  renderHistory();
}

function renderHistory() {
  historyList.innerHTML = '';
  history.forEach(item => {
    const el = document.createElement('div');
    el.className = 'history-item';
    el.innerHTML = `<span class="history-sl">${item.sl}</span>` +
                   `<span class="history-tk">TK ${item.tk}</span>` +
                   `<span class="history-time">${item.time}</span>`;
    historyList.appendChild(el);
  });
}

clearHistBtn.addEventListener('click', () => {
  history = [];
  renderHistory();
  saveState();
});

/* =====================================================================
   HAPTIC FEEDBACK
   ===================================================================== */
function vibrate(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}

function flashBtn(btn) {
  btn.classList.add('tapped');
  setTimeout(() => btn.classList.remove('tapped'), 100);
}

/* =====================================================================
   SLATE / TAKE CONTROLS
   ===================================================================== */
function bumpSlateBtn(direction) {
  const s = parseSlate(slateField.value);
  if (!s) return;
  let idx = variantToIndex(s.variant) + direction;
  if (idx < 0) idx = 0;
  s.variant = indexToVariant(idx);
  const newSlate = formatSlate(s);
  // Log the current before bumping
  addHistory(slateField.value, takeField.value);
  slateField.value = newSlate;
  if (!isNaN(parseInt(takeField.value.trim(), 10))) takeField.value = '1';
  saveState();
  vibrate(8);
}

function bumpTakeBtn(direction) {
  const val = takeField.value.trim();
  let n = parseInt(val, 10);
  if (isNaN(n)) {
    n = direction > 0 ? 1 : 1;
  } else {
    n = Math.max(1, n + direction);
  }
  takeField.value = String(n);
  saveState();
  vibrate(6);
}

function resetTake() {
  if (takeField.value !== '1') {
    addHistory(slateField.value, takeField.value);
  }
  takeField.value = '1';
  saveState();
  vibrate([6, 30, 6]);
}

const slPlus  = document.getElementById('sl-plus');
const slMinus = document.getElementById('sl-minus');
const tkPlus  = document.getElementById('tk-plus');
const tkMinus = document.getElementById('tk-minus');
const sunBtn  = document.getElementById('sunny-btn');
const ovcBtn  = document.getElementById('overcast-btn');
const rstBtn  = document.getElementById('reset-tk-btn');

slPlus.addEventListener('click',  () => { flashBtn(slPlus);  bumpSlateBtn(1);  });
slMinus.addEventListener('click', () => { flashBtn(slMinus); bumpSlateBtn(-1); });
tkPlus.addEventListener('click',  () => { flashBtn(tkPlus);  bumpTakeBtn(1);   });
tkMinus.addEventListener('click', () => { flashBtn(tkMinus); bumpTakeBtn(-1);  });

sunBtn.addEventListener('click', () => {
  flashBtn(sunBtn);
  // Deactivate overcast
  ovcBtn.classList.remove('active');
  sunBtn.classList.toggle('active');
  takeField.value = sunBtn.classList.contains('active') ? 'Sunny' : '1';
  saveState(); vibrate(6);
});
ovcBtn.addEventListener('click', () => {
  flashBtn(ovcBtn);
  sunBtn.classList.remove('active');
  ovcBtn.classList.toggle('active');
  takeField.value = ovcBtn.classList.contains('active') ? 'Overcast' : '1';
  saveState(); vibrate(6);
});

rstBtn.addEventListener('click', () => {
  flashBtn(rstBtn);
  sunBtn.classList.remove('active');
  ovcBtn.classList.remove('active');
  resetTake();
});

/* ---- Field validation / formatting ---- */
slateField.addEventListener('input', () => {
  slateField.value = slateField.value.toUpperCase();
  const s = parseSlate(slateField.value);
  slateHint.textContent = s ? '' : 'Format: 1-1, 2-A1, 7-G14B…';
});
slateField.addEventListener('blur', () => {
  const s = parseSlate(slateField.value);
  if (!s) {
    const saved = loadState();
    slateField.value = (saved && saved.slate) || '1-1';
  } else {
    slateField.value = formatSlate(s);
  }
  slateHint.textContent = '';
  saveState();
});
takeField.addEventListener('blur', () => {
  saveState();
});
// Deactivate condition buttons when take is manually edited
takeField.addEventListener('input', () => {
  const v = takeField.value.trim().toLowerCase();
  sunBtn.classList.toggle('active', v === 'sunny');
  ovcBtn.classList.toggle('active', v === 'overcast');
});

/* =====================================================================
   WAKE LOCK
   ===================================================================== */
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

/* =====================================================================
   CLEANUP
   ===================================================================== */
window.addEventListener('pagehide', () => {
  if (wakeLock) { try { wakeLock.release(); } catch(e){} }
});
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick',     e => e.preventDefault());

updateStartBtn();
</script>
</body>
</html>
